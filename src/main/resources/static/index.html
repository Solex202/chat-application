<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>SpringChat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#0f0f13;--panel:#16161d;--border:#252530;--accent:#7C3AED;
            --text:#e2e2ea;--muted:#5a5a72;--hover:#1e1e2a;
            --msg-out:#7C3AED;--msg-in:#1e1e2a;
            --font:'Segoe UI',system-ui,sans-serif;
        }
        body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

        .topbar{height:48px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
        .topbar-logo{font-size:16px;font-weight:700;color:var(--accent)}
        .topbar-status{font-size:11px;color:var(--muted);margin-left:auto;display:flex;align-items:center;gap:5px}
        .status-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;transition:background .3s}
        .status-dot.online{background:#22c55e;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

        .app{display:flex;flex:1;overflow:hidden}

        /* LOGIN */
        .login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
        .login-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:32px;width:320px;display:flex;flex-direction:column;gap:16px}
        .login-card h2{font-size:18px;font-weight:700;color:var(--accent)}
        .login-card p{font-size:12px;color:var(--muted);line-height:1.5}
        .field{display:flex;flex-direction:column;gap:5px}
        .field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
        .field input{background:#0a0a0f;border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
        .field input:focus{border-color:var(--accent)}
        .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
        .btn-primary:hover{background:#6D28D9}

        /* SIDEBAR */
        .sidebar{width:230px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
        .sidebar-hdr{padding:12px;border-bottom:1px solid var(--border);font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;justify-content:space-between}
        .user-count{background:var(--accent);color:#fff;font-size:9px;border-radius:8px;padding:1px 6px}
        .user-list{flex:1;overflow-y:auto;padding:6px}
        .user-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:7px;cursor:pointer;transition:background .15s;position:relative}
        .user-item:hover{background:var(--hover)}
        .user-item.active{background:#1e1427}
        .user-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--accent);border-radius:1px}
        .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
        .user-meta{flex:1;min-width:0}
        .user-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .user-status{font-size:10px;color:var(--muted)}
        .unread-badge{background:var(--accent);color:#fff;font-size:9px;border-radius:8px;padding:1px 5px;flex-shrink:0}
        .presence-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--panel);position:absolute;bottom:6px;left:32px;background:#555}
        .presence-dot.on{background:#22c55e}

        /* CHAT */
        .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .chat-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--panel)}
        .chat-hdr .avatar{width:36px;height:36px;font-size:13px}
        .chat-hdr-meta{flex:1}
        .chat-hdr-name{font-size:14px;font-weight:600}
        .chat-hdr-sub{font-size:11px;color:var(--muted)}

        .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
        .messages::-webkit-scrollbar{width:4px}
        .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        .msg-row{display:flex;flex-direction:column;max-width:68%}
        .msg-row.out{align-self:flex-end;align-items:flex-end}
        .msg-row.in{align-self:flex-start;align-items:flex-start}
        .msg-bubble{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;animation:msgIn .18s ease}
        @keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
        .msg-row.out .msg-bubble{background:var(--msg-out);color:#fff;border-bottom-right-radius:4px}
        .msg-row.in  .msg-bubble{background:var(--msg-in);color:var(--text);border-bottom-left-radius:4px}
        .msg-meta{font-size:9px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:4px}
        .tick{color:#a78bfa}

        .typing-row{display:none;align-self:flex-start}
        .typing-row.show{display:flex}
        .typing-bubble{background:var(--msg-in);padding:9px 12px;border-radius:14px;border-bottom-left-radius:4px;display:flex;gap:4px;align-items:center}
        .typing-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite}
        .typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
        @keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

        .input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--panel);flex-shrink:0}
        .msg-input{flex:1;background:#0a0a0f;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;resize:none;font-family:var(--font);transition:border-color .2s;max-height:120px}
        .msg-input:focus{border-color:var(--accent)}
        .send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:16px;cursor:pointer;transition:background .15s,transform .1s;flex-shrink:0;align-self:flex-end}
        .send-btn:hover{background:#6D28D9}
        .send-btn:active{transform:scale(.93)}
        .send-btn:disabled{background:var(--border);cursor:default}

        .no-chat{display:flex;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}
        .no-chat .icon{font-size:48px;opacity:.3}
        .no-chat p{font-size:13px;max-width:220px;text-align:center;line-height:1.6}

        .toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:200;pointer-events:none}
        .toast{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--muted);animation:toastIn .25s ease;max-width:220px}
        @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

        .user-list::-webkit-scrollbar{width:3px}
        .user-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    </style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
    <div class="login-card">
        <h2>💬 SpringChat</h2>
        <p>Enter a username to join. Open multiple tabs to simulate different users chatting.</p>
        <div class="field">
            <label>Username (no spaces)</label>
            <input id="login-id" type="text" placeholder="e.g. alice" maxlength="20" autofocus>
        </div>
        <div class="field">
            <label>Display Name</label>
            <input id="login-name" type="text" placeholder="e.g. Alice Johnson" maxlength="30">
        </div>
        <button class="btn-primary" onclick="doLogin()">Join Chat</button>
    </div>
</div>

<div class="topbar">
    <span class="topbar-logo">💬 SpringChat</span>
    <span id="me-label" style="font-size:12px;color:var(--muted)"></span>
    <div class="topbar-status">
        <div class="status-dot" id="conn-dot"></div>
        <span id="conn-label">Disconnected</span>
    </div>
</div>

<div class="app">
    <div class="sidebar">
        <div class="sidebar-hdr">
            Users <span class="user-count" id="user-count">0</span>
        </div>
        <div class="user-list" id="user-list">
            <div style="font-size:11px;color:var(--muted);text-align:center;padding:20px">Connect to see users</div>
        </div>
    </div>

    <div class="chat-area" id="chat-area">
        <div class="no-chat" id="no-chat">
            <div class="icon">💬</div>
            <p>Select a user from the sidebar to start chatting</p>
        </div>

        <div id="conversation" style="display:none;flex:1;flex-direction:column;overflow:hidden">
            <div class="chat-hdr">
                <div class="avatar" id="peer-avatar"></div>
                <div class="chat-hdr-meta">
                    <div class="chat-hdr-name" id="peer-name"></div>
                    <div class="chat-hdr-sub" id="peer-sub">Online</div>
                </div>
            </div>
            <div class="messages" id="messages">
                <div class="typing-row" id="typing-row">
                    <div class="typing-bubble">
                        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                    </div>
                </div>
            </div>
            <div class="input-area">
        <textarea class="msg-input" id="msg-input" rows="1" placeholder="Type a message…"
                  oninput="autoResize(this);onTyping()"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>↑</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
    // ── STATE ──────────────────────────────────────────────────────────────────
    const state = {
        me: null,
        stompClient: null,
        connected: false,
        activePeer: null,
        users: {},          // userId → { id, displayName, online }
        messages: {},       // peerId → [msg, ...]
        unread: {},
        typingTimers: {},
    };

    const COLORS = ['#7C3AED','#059669','#D97706','#DB2777','#0284C7','#DC2626'];
    function colorFor(id) {
        let h = 0;
        for (let i = 0; i < id.length; i++) h = id.charCodeAt(i) + (h << 5) - h;
        return COLORS[Math.abs(h) % COLORS.length];
    }
    function initials(name) {
        return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }

    // ── LOGIN ──────────────────────────────────────────────────────────────────
    document.getElementById('login-id').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('login-name').focus();
    });
    document.getElementById('login-name').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
        const id   = document.getElementById('login-id').value.trim().replace(/\s+/g, '_');
        const name = document.getElementById('login-name').value.trim() || id;
        if (!id) { document.getElementById('login-id').focus(); return; }
        state.me = { id, displayName: name };
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('me-label').textContent = `${name} (${id})`;
        connectWS();
    }

    // ── WEBSOCKET ──────────────────────────────────────────────────────────────
    function connectWS() {
        const sock   = new SockJS('/ws');
        const client = Stomp.over(sock);
        client.debug  = null; // silence STOMP debug logs
        state.stompClient = client;

        client.connect(
            { userId: state.me.id, displayName: state.me.displayName },
            onConnected,
            onError
        );
    }

    function onConnected() {
        state.connected = true;
        setConnStatus(true);

        // ── KEY FIX ──────────────────────────────────────────────────────────────
        // Subscribe to /user/queue/messages (WITHOUT the userId in the path).
        // When using convertAndSendToUser() on the server, Spring's
        // UserDestinationMessageHandler prepends the session-specific prefix
        // automatically. The client must subscribe to /user/queue/... (no username).
        // ─────────────────────────────────────────────────────────────────────────
        state.stompClient.subscribe('/user/queue/messages', frame => {
            handleIncomingMessage(JSON.parse(frame.body));
        });

        // System events (joins, leaves, typing)
        state.stompClient.subscribe('/topic/events', frame => {
            handleSystemEvent(JSON.parse(frame.body));
        });

        loadUsers();

        // Flush any messages that arrived while we were offline
        fetch(`/api/messages/${state.me.id}/pending`)
            .then(r => r.json())
            .then(msgs => msgs.forEach(m => storeAndRender(m)));
    }

    function onError() {
        state.connected = false;
        setConnStatus(false);
        setTimeout(connectWS, 3000);
    }

    // ── REST ───────────────────────────────────────────────────────────────────
    function loadUsers() {
        fetch('/api/users')
            .then(r => r.json())
            .then(users => {
                users.forEach(u => { if (u.id !== state.me.id) state.users[u.id] = u; });
                renderUserList();
            });
    }

    function loadHistory(peerId) {
        fetch(`/api/messages/${state.me.id}/${peerId}`)
            .then(r => r.json())
            .then(data => {
                state.messages[peerId] = data.messages || [];
                renderMessages();
            });
    }

    // ── SEND ───────────────────────────────────────────────────────────────────
    function sendMsg() {
        const input   = document.getElementById('msg-input');
        const content = input.value.trim();
        if (!content || !state.activePeer || !state.connected) return;

        // Send to server — do NOT optimistically render here.
        // The server echoes the confirmed message back to the sender via
        // convertAndSendToUser(senderId, ...) so it arrives through the
        // subscription just like any incoming message, with the real id + timestamp.
        state.stompClient.send('/app/chat.send', {}, JSON.stringify({
            senderId:   state.me.id,
            receiverId: state.activePeer,
            content,
            type: 'CHAT',
        }));

        input.value = '';
        input.style.height = 'auto';
    }

    let typingTimeout;
    function onTyping() {
        if (!state.activePeer || !state.connected) return;
        clearTimeout(typingTimeout);
        state.stompClient.send('/app/chat.typing', {}, JSON.stringify({
            senderId:   state.me.id,
            receiverId: state.activePeer,
        }));
        typingTimeout = setTimeout(() => {}, 2000);
    }

    // ── INBOUND ────────────────────────────────────────────────────────────────
    function handleIncomingMessage(msg) {
        // This fires for BOTH the receiver AND the sender (server echoes back).
        // For the sender: msg.senderId === state.me.id → peerId is receiverId.
        // For the receiver: msg.senderId !== state.me.id → peerId is senderId.
        storeAndRender(msg);

        const peerId = msg.senderId === state.me.id ? msg.receiverId : msg.senderId;

        // Show unread badge if the conversation isn't currently open
        if (state.activePeer !== peerId && msg.senderId !== state.me.id) {
            state.unread[peerId] = (state.unread[peerId] || 0) + 1;
            renderUserList();
            toast(`New message from ${msg.senderName || msg.senderId}`);
        }
    }

    function handleSystemEvent(event) {
        if (event.userId === state.me.id) return;

        if (event.eventType === 'USER_JOINED') {
            state.users[event.userId] = {
                id: event.userId,
                displayName: event.displayName || event.userId,
                online: true,
            };
            renderUserList();
            toast(`${event.displayName || event.userId} joined`);
        } else if (event.eventType === 'USER_LEFT') {
            if (state.users[event.userId]) {
                state.users[event.userId].online = false;
                renderUserList();
            }
            if (state.activePeer === event.userId) {
                document.getElementById('peer-sub').textContent = 'Offline';
            }
            toast(`${state.users[event.userId]?.displayName || event.userId} went offline`);
        } else if (event.eventType === 'TYPING') {
            if (state.activePeer === event.userId) showTyping(event.userId);
        }
    }

    function storeAndRender(msg) {
        const peerId = msg.senderId === state.me.id ? msg.receiverId : msg.senderId;
        if (!state.messages[peerId]) state.messages[peerId] = [];

        // De-duplicate: skip if we already have a message with the same DB id
        if (msg.id && state.messages[peerId].some(m => m.id === msg.id)) return;

        state.messages[peerId].push(msg);
        if (state.activePeer === peerId) renderMessages();
    }

    // ── RENDER USER LIST ───────────────────────────────────────────────────────
    function renderUserList() {
        const el    = document.getElementById('user-list');
        const cnt   = document.getElementById('user-count');
        const users = Object.values(state.users);
        cnt.textContent = users.filter(u => u.online).length;

        if (!users.length) {
            el.innerHTML = '<div style="font-size:11px;color:var(--muted);text-align:center;padding:20px">No other users yet</div>';
            return;
        }

        users.sort((a, b) =>
            (b.online ? 1 : 0) - (a.online ? 1 : 0) ||
            a.displayName.localeCompare(b.displayName)
        );

        el.innerHTML = users.map(u => {
            const col    = colorFor(u.id);
            const active = state.activePeer === u.id ? 'active' : '';
            const unread = state.unread[u.id]
                ? `<span class="unread-badge">${state.unread[u.id]}</span>` : '';
            return `
      <div class="user-item ${active}" onclick="openChat('${u.id}')">
        <div class="avatar" style="background:${col}20;color:${col}">${initials(u.displayName)}</div>
        <div class="presence-dot ${u.online ? 'on' : ''}"></div>
        <div class="user-meta">
          <div class="user-name">${u.displayName}</div>
          <div class="user-status">${u.online ? 'Online' : 'Offline'}</div>
        </div>
        ${unread}
      </div>`;
        }).join('');
    }

    // ── RENDER MESSAGES ────────────────────────────────────────────────────────
    function renderMessages() {
        const el   = document.getElementById('messages');
        const msgs = state.messages[state.activePeer] || [];
        const typing = document.getElementById('typing-row');

        el.innerHTML = '';
        el.appendChild(typing);

        msgs.forEach(m => {
            const isOut = m.senderId === state.me.id;
            const time  = m.sentAt
                ? new Date(m.sentAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : '';
            const tick = isOut
                ? `<span class="tick">${m.delivered ? '✓✓' : '✓'}</span>`
                : '';
            const row = document.createElement('div');
            row.className = `msg-row ${isOut ? 'out' : 'in'}`;
            row.innerHTML = `
      <div class="msg-bubble">${escHtml(m.content)}</div>
      <div class="msg-meta">${time} ${tick}</div>`;
            el.insertBefore(row, typing);
        });
        el.scrollTop = el.scrollHeight;
    }

    // ── OPEN CHAT ──────────────────────────────────────────────────────────────
    function openChat(peerId) {
        state.activePeer  = peerId;
        state.unread[peerId] = 0;
        const peer = state.users[peerId] || { id: peerId, displayName: peerId, online: false };
        const col  = colorFor(peerId);

        document.getElementById('no-chat').style.display      = 'none';
        document.getElementById('conversation').style.display = 'flex';
        document.getElementById('peer-avatar').textContent    = initials(peer.displayName);
        document.getElementById('peer-avatar').style.background = col + '20';
        document.getElementById('peer-avatar').style.color   = col;
        document.getElementById('peer-name').textContent     = peer.displayName;
        document.getElementById('peer-sub').textContent      = peer.online ? 'Online' : 'Offline';
        document.getElementById('send-btn').disabled         = !state.connected;

        renderUserList();

        // Load history from DB on first open; already-loaded conversations render instantly
        if (!state.messages[peerId]) {
            loadHistory(peerId);
        } else {
            renderMessages();
        }
    }

    // ── TYPING INDICATOR ───────────────────────────────────────────────────────
    function showTyping(peerId) {
        if (state.activePeer !== peerId) return;
        const row = document.getElementById('typing-row');
        row.classList.add('show');
        clearTimeout(state.typingTimers[peerId]);
        state.typingTimers[peerId] = setTimeout(() => row.classList.remove('show'), 2500);
        document.getElementById('messages').scrollTop = 9999;
    }

    // ── UTILS ──────────────────────────────────────────────────────────────────
    function setConnStatus(online) {
        document.getElementById('conn-dot').className     = 'status-dot' + (online ? ' online' : '');
        document.getElementById('conn-label').textContent = online ? 'Connected' : 'Reconnecting…';
        const btn = document.getElementById('send-btn');
        if (btn) btn.disabled = !online;
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function escHtml(s) {
        return s
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
    }

    function toast(msg) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className   = 'toast';
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }
</script>
</body>
</html>
